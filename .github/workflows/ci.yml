name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -p matplotlib-python --no-deps -- -D warnings

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build matplotlib-python binary
        run: cargo build -p matplotlib-python

      - name: Install pytest into python/
        run: |
          pip3 install "pytest==8.4.2" pluggy iniconfig packaging pygments py --target python/ --no-deps
          # legacypath imports pytester which uses syntax RustPython can't handle.
          # We don't use tmpdir fixtures, so remove the legacypath import from pytest/__init__.py
          sed -i '/legacypath/d' python/pytest/__init__.py
          # Also stub legacypath so nothing else breaks
          printf 'class TempdirFactory: pass\nclass TempPathFactory: pass\n' > python/_pytest/legacypath.py

      - name: Run Python tests
        run: target/debug/matplotlib-python -m pytest python/matplotlib/tests/

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build for WASM
        run: cargo build --target wasm32-wasip1
