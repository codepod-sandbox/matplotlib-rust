name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -p matplotlib-python --no-deps -- -D warnings

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build matplotlib-python binary
        run: cargo build -p matplotlib-python

      - name: Install pytest into python/
        run: |
          pip3 install "pytest==8.4.2" pluggy iniconfig packaging pygments py --target python/ --no-deps
          # RustPython can't handle set comprehensions in certain scopes in pytester.py.
          # Rewrite to list comprehensions wrapped in set() which RustPython handles fine.
          sed -i 's/{t\[0\] for t in lines2}/set([t[0] for t in lines2])/g; s/{t\[0\] for t in lines1}/set([t[0] for t in lines1])/g' python/_pytest/pytester.py

      - name: Run Python tests
        run: target/debug/matplotlib-python -m pytest python/matplotlib/tests/

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build for WASM
        run: cargo build --target wasm32-wasip1
